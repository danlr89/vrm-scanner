<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VRM Scanner</title>
  <style>
    :root {
      --bg: #080810;
      --surface: #0f0f1c;
      --surface-2: #171729;
      --gold: #f5c518;
      --gold-soft: rgba(245, 197, 24, 0.18);
      --green: #00e676;
      --red: #ff5252;
      --text: #f7f7fb;
      --muted: #a9a9bb;
      --line: rgba(255, 255, 255, 0.12);
      --plate-ratio: 520 / 111;
      color-scheme: dark;
      font-family: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      overflow-x: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    img,
    video,
    canvas {
      display: block;
      max-width: 100%;
    }

    .app {
      min-height: 100dvh;
      background:
        linear-gradient(180deg, rgba(245, 197, 24, 0.08), transparent 28rem),
        var(--bg);
    }

    .screen {
      display: none;
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .center {
      justify-content: center;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .panel {
      width: min(100%, 520px);
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .plate-badge {
      width: min(88vw, 520px);
      aspect-ratio: var(--plate-ratio);
      border: 2px solid #d3a900;
      border-radius: 7px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.10), transparent 13%, transparent 87%, rgba(0, 0, 0, 0.10)),
        var(--gold);
      color: #070707;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: clamp(30px, 10vw, 62px);
      letter-spacing: 0;
      text-transform: uppercase;
      box-shadow: 0 16px 50px rgba(245, 197, 24, 0.2);
      white-space: nowrap;
      padding: 0 16px;
    }

    .copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      max-width: 46ch;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 7vw, 40px);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .button-row {
      display: flex;
      width: min(100%, 420px);
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      padding: 0 18px;
      border-radius: 7px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      text-transform: uppercase;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    .btn.primary {
      background: var(--gold);
      color: #090909;
      border-color: #d7aa00;
    }

    .btn.full {
      width: 100%;
      max-width: 360px;
    }

    .camera-screen {
      padding: 0;
      min-height: 100dvh;
      background: #020205;
    }

    .camera-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .video-stage {
      position: relative;
      height: 55dvh;
      min-height: 330px;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cutout {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 88vw;
      max-width: calc(100vw - 24px);
      aspect-ratio: var(--plate-ratio);
      transform: translate(-50%, -50%);
      border: 3px solid var(--gold);
      border-radius: 5px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .cutout::before,
    .cutout::after,
    .brackets::before,
    .brackets::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #fff;
      border-style: solid;
      z-index: 3;
    }

    .cutout::before {
      left: 7px;
      top: 7px;
      border-width: 3px 0 0 3px;
    }

    .cutout::after {
      right: 7px;
      top: 7px;
      border-width: 3px 3px 0 0;
    }

    .brackets::before {
      left: 7px;
      bottom: 7px;
      border-width: 0 0 3px 3px;
    }

    .brackets::after {
      right: 7px;
      bottom: 7px;
      border-width: 0 3px 3px 0;
    }

    .sweep {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background: var(--gold);
      box-shadow: 0 0 14px var(--gold), 0 0 28px rgba(245, 197, 24, 0.65);
      animation: sweep 1.9s ease-in-out infinite alternate;
      z-index: 2;
    }

    @keyframes sweep {
      from { transform: translateY(0); }
      to { transform: translateY(calc((88vw / 4.6846) - 6px)); }
    }

    .align-label {
      position: absolute;
      left: 50%;
      top: calc(50% + (88vw / 9.3692) + 14px);
      width: min(88vw, 520px);
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 8px #000;
    }

    .camera-controls {
      flex: 1;
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 18px;
      padding: 20px 18px max(24px, env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .status-strip {
      min-height: 44px;
      width: min(100%, 520px);
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .capture {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: var(--gold);
      color: #080808;
      border: 7px solid rgba(255, 255, 255, 0.92);
      font-size: 38px;
      display: grid;
      place-items: center;
      box-shadow: 0 0 0 8px rgba(245, 197, 24, 0.16), 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .capture[disabled],
    .btn[disabled] {
      opacity: 0.52;
      cursor: progress;
    }

    .found-image {
      width: min(88vw, 520px);
      aspect-ratio: var(--plate-ratio);
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #000;
    }

    .result-screen {
      gap: 18px;
      align-items: center;
    }

    .result-wrap {
      width: min(100%, 720px);
      display: grid;
      gap: 16px;
    }

    .values {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .value-card {
      min-width: 0;
      padding: 14px 10px;
      border-radius: 7px;
      background: var(--surface);
      border: 1px solid var(--line);
      text-align: center;
    }

    .value-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .value-card span {
      display: block;
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .value-card.trade span { color: var(--red); }
    .value-card.private span { color: var(--gold); }
    .value-card.retail span { color: var(--green); }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .detail {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
    }

    .detail span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .detail strong {
      display: block;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .notes {
      padding: 14px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      line-height: 1.45;
    }

    .loader {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 8px;
      align-items: center;
    }

    .loader i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      animation: dot 1s ease-in-out infinite;
    }

    .loader i:nth-child(2) { animation-delay: 0.16s; }
    .loader i:nth-child(3) { animation-delay: 0.32s; }

    @keyframes dot {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    .error-box {
      width: min(100%, 520px);
      padding: 18px;
      border: 1px solid rgba(255, 82, 82, 0.45);
      border-radius: 7px;
      background: rgba(255, 82, 82, 0.08);
      color: #ffd1d1;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .hidden-canvases {
      display: none;
    }

    @media (max-width: 420px) {
      .values,
      .details-grid {
        grid-template-columns: 1fr;
      }

      .cutout {
        width: calc(100vw - 24px);
      }

      .align-label {
        width: calc(100vw - 24px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="idleScreen" class="screen center active" aria-labelledby="idleTitle">
      <div class="panel">
        <div class="plate-badge">AB12 CDE</div>
        <h1 id="idleTitle" class="title">VRM Scanner</h1>
        <p class="copy">Scan a UK number plate, crop the plate region, extract the VRM, then request a motor trade valuation.</p>
        <button id="startBtn" class="btn primary full" type="button">START CAMERA</button>
      </div>
    </section>

    <section id="cameraScreen" class="screen camera-screen" aria-label="Camera scanner">
      <div class="camera-shell">
        <div id="videoStage" class="video-stage">
          <video id="video" playsinline muted autoplay></video>
          <div id="cutout" class="cutout" aria-hidden="true">
            <div class="brackets"></div>
            <div class="sweep"></div>
          </div>
          <div class="align-label">ALIGN PLATE INSIDE BOX</div>
        </div>
        <div class="camera-controls">
          <div id="scanStatus" class="status-strip">Camera ready.</div>
          <button id="captureBtn" class="capture" type="button" aria-label="Capture plate">📷</button>
          <button id="cancelBtn" class="btn" type="button">CANCEL</button>
        </div>
      </div>
    </section>

    <section id="foundScreen" class="screen center" aria-labelledby="foundTitle">
      <div class="panel">
        <h2 id="foundTitle" class="title">Plate Found</h2>
        <img id="foundImage" class="found-image" alt="Cropped plate image">
        <div id="foundPlate" class="plate-badge">AB12CDE</div>
        <div class="button-row">
          <button id="valuationBtn" class="btn primary" type="button">Get Valuation</button>
          <button id="scanAgainBtn" class="btn" type="button">Scan Again</button>
        </div>
      </div>
    </section>

    <section id="valuatingScreen" class="screen center" aria-labelledby="valuatingTitle">
      <div class="panel">
        <div id="valuatingPlate" class="plate-badge">AB12CDE</div>
        <h2 id="valuatingTitle" class="title">Valuating</h2>
        <div class="loader" aria-hidden="true"><i></i><i></i><i></i></div>
      </div>
    </section>

    <section id="resultScreen" class="screen result-screen" aria-labelledby="resultTitle">
      <div class="result-wrap">
        <div id="resultPlate" class="plate-badge">AB12CDE</div>
        <h2 id="resultTitle" class="title">Valuation</h2>
        <div class="values">
          <div class="value-card trade"><strong>Trade</strong><span id="tradeValue">-</span></div>
          <div class="value-card private"><strong>Private</strong><span id="privateValue">-</span></div>
          <div class="value-card retail"><strong>Retail</strong><span id="retailValue">-</span></div>
        </div>
        <div id="detailsGrid" class="details-grid"></div>
        <div id="notes" class="notes">-</div>
        <button id="scanAnotherBtn" class="btn primary full" type="button">Scan Another</button>
      </div>
    </section>

    <section id="errorScreen" class="screen center" aria-labelledby="errorTitle">
      <div class="panel">
        <h2 id="errorTitle" class="title">Error</h2>
        <div id="errorText" class="error-box" role="alert"></div>
        <button id="retryBtn" class="btn primary full" type="button">RETRY</button>
      </div>
    </section>
  </main>

  <div class="hidden-canvases" aria-hidden="true">
    <canvas id="frameCanvas"></canvas>
    <canvas id="cropCanvas"></canvas>
  </div>

  <script>
    (() => {
      "use strict";

      const OPENAI_MODEL = window.OPENAI_MODEL || "gpt-4.1-mini";
      const OPENAI_ENDPOINT = window.OPENAI_RESPONSES_ENDPOINT || "https://api.openai.com/v1/responses";
      const PLATE_RATIO = 520 / 111;
      const AUTO_SCAN_MS = 4000;
      const NO_PLATE_MS = 2500;

      const screens = {
        idle: document.getElementById("idleScreen"),
        camera: document.getElementById("cameraScreen"),
        found: document.getElementById("foundScreen"),
        valuating: document.getElementById("valuatingScreen"),
        result: document.getElementById("resultScreen"),
        error: document.getElementById("errorScreen")
      };

      const video = document.getElementById("video");
      const videoStage = document.getElementById("videoStage");
      const cutout = document.getElementById("cutout");
      const frameCanvas = document.getElementById("frameCanvas");
      const cropCanvas = document.getElementById("cropCanvas");
      const scanStatus = document.getElementById("scanStatus");
      const foundImage = document.getElementById("foundImage");
      const foundPlate = document.getElementById("foundPlate");
      const valuatingPlate = document.getElementById("valuatingPlate");
      const resultPlate = document.getElementById("resultPlate");
      const tradeValue = document.getElementById("tradeValue");
      const privateValue = document.getElementById("privateValue");
      const retailValue = document.getElementById("retailValue");
      const detailsGrid = document.getElementById("detailsGrid");
      const notes = document.getElementById("notes");
      const errorText = document.getElementById("errorText");
      const captureBtn = document.getElementById("captureBtn");
      const valuationBtn = document.getElementById("valuationBtn");

      let stream = null;
      let autoTimer = null;
      let busy = false;
      let lastCropDataUrl = "";
      let confirmedVrm = "";

      const extractionPrompt = "This is a cropped image at UK number plate proportions (520mm x 111mm). Read the registration characters carefully. UK plates have black text on yellow (rear) or white (front). Return ONLY JSON: {\"vrm\":\"AB12CDE\"} - uppercase, no spaces, no hyphens. If unreadable return {\"vrm\":null}. No other text.";

      function showScreen(name) {
        Object.keys(screens).forEach((key) => {
          screens[key].classList.toggle("active", key === name);
        });
      }

      function setStatus(message) {
        scanStatus.textContent = message;
      }

      function setError(message) {
        errorText.textContent = message || "Something went wrong.";
        showScreen("error");
      }

      function getOpenAIKey() {
        const meta = document.querySelector("meta[name='openai-api-key']");
        return window.OPENAI_API_KEY ||
          window.OPENAI_API_TOKEN ||
          (meta && meta.content) ||
          "";
      }

      function getHeaders() {
        const headers = { "Content-Type": "application/json" };
        const key = getOpenAIKey();
        if (key) headers.Authorization = `Bearer ${key}`;
        return headers;
      }

      async function startCamera() {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("Camera access is not available in this browser.");
          }

          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 }
            },
            audio: false
          });

          video.srcObject = stream;
          await video.play();
          showScreen("camera");
          setStatus("Camera active. Align plate inside box.");
          startAutoScan();
        } catch (error) {
          setError(`Unable to start camera: ${error.message}`);
        }
      }

      function stopCamera() {
        stopAutoScan();
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }
        video.srcObject = null;
        busy = false;
        captureBtn.disabled = false;
      }

      function startAutoScan() {
        stopAutoScan();
        autoTimer = window.setInterval(() => {
          scanPlate("auto");
        }, AUTO_SCAN_MS);
      }

      function stopAutoScan() {
        if (autoTimer) {
          window.clearInterval(autoTimer);
          autoTimer = null;
        }
      }

      function cropPlateFromVideo() {
        if (!video.videoWidth || !video.videoHeight) {
          throw new Error("Video frame is not ready yet.");
        }

        const videoRect = videoStage.getBoundingClientRect();
        const cutoutRect = cutout.getBoundingClientRect();
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const scale = Math.max(videoRect.width / vw, videoRect.height / vh);
        const renderedW = vw * scale;
        const renderedH = vh * scale;
        const offsetX = (videoRect.width - renderedW) / 2;
        const offsetY = (videoRect.height - renderedH) / 2;

        const cutLeft = cutoutRect.left - videoRect.left;
        const cutTop = cutoutRect.top - videoRect.top;
        let sx = (cutLeft - offsetX) / scale;
        let sy = (cutTop - offsetY) / scale;
        let sw = cutoutRect.width / scale;
        let sh = cutoutRect.height / scale;

        sx = Math.max(0, Math.min(vw - 1, sx));
        sy = Math.max(0, Math.min(vh - 1, sy));
        sw = Math.max(1, Math.min(vw - sx, sw));
        sh = Math.max(1, Math.min(vh - sy, sh));

        frameCanvas.width = vw;
        frameCanvas.height = vh;
        frameCanvas.getContext("2d").drawImage(video, 0, 0, vw, vh);

        const outW = Math.round(sw * 2);
        const outH = Math.round(outW / PLATE_RATIO);
        cropCanvas.width = outW;
        cropCanvas.height = outH;
        cropCanvas.getContext("2d").drawImage(frameCanvas, sx, sy, sw, sh, 0, 0, outW, outH);

        return cropCanvas.toDataURL("image/jpeg", 0.9);
      }

      async function callOpenAIForText(input, textFormat) {
        const headers = getHeaders();
        const isDirectOpenAI = /^https:\/\/api\.openai\.com\//.test(OPENAI_ENDPOINT);
        if (isDirectOpenAI && !headers.Authorization) {
          throw new Error("OpenAI API key was not injected. Define window.OPENAI_API_KEY, window.OPENAI_API_TOKEN, or use a proxy endpoint in window.OPENAI_RESPONSES_ENDPOINT.");
        }

        const payload = {
          model: OPENAI_MODEL,
          input,
          text: textFormat || { format: { type: "json_object" } }
        };

        const response = await fetch(OPENAI_ENDPOINT, {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const detail = await response.text().catch(() => "");
          throw new Error(`OpenAI request failed (${response.status}). ${detail.slice(0, 240)}`);
        }

        const data = await response.json();
        return extractOutputText(data);
      }

      function extractOutputText(data) {
        if (typeof data.output_text === "string") return data.output_text;
        const parts = [];
        (data.output || []).forEach((item) => {
          (item.content || []).forEach((content) => {
            if (typeof content.text === "string") parts.push(content.text);
            if (typeof content.output_text === "string") parts.push(content.output_text);
          });
        });
        return parts.join("").trim();
      }

      function parseJsonText(text) {
        const trimmed = String(text || "").trim();
        try {
          return JSON.parse(trimmed);
        } catch (_) {
          const match = trimmed.match(/\{[\s\S]*\}/);
          if (match) return JSON.parse(match[0]);
          throw new Error("The model response was not valid JSON.");
        }
      }

      async function extractPlate(cropDataUrl) {
        const output = await callOpenAIForText([
          {
            role: "user",
            content: [
              { type: "input_text", text: extractionPrompt },
              { type: "input_image", image_url: cropDataUrl, detail: "high" }
            ]
          }
        ]);
        const parsed = parseJsonText(output);
        const vrm = parsed && typeof parsed.vrm === "string" ? parsed.vrm.replace(/[^A-Z0-9]/gi, "").toUpperCase() : null;
        return vrm || null;
      }

      async function scanPlate(mode) {
        if (busy || !stream) return;
        busy = true;
        captureBtn.disabled = true;

        try {
          const now = new Date();
          if (mode === "auto") setStatus(`Auto-scan ${now.toLocaleTimeString()}`);
          if (mode === "manual") setStatus("Scanning cropped plate...");

          const cropDataUrl = cropPlateFromVideo();
          const vrm = await extractPlate(cropDataUrl);

          if (!vrm) {
            if (mode === "manual") {
              setStatus("NO PLATE FOUND — HOLD STILL & TRY AGAIN");
              window.setTimeout(() => setStatus("Camera active. Align plate inside box."), NO_PLATE_MS);
            } else {
              setStatus(`Auto-scan ${now.toLocaleTimeString()} - no plate found.`);
            }
            return;
          }

          confirmedVrm = vrm;
          lastCropDataUrl = cropDataUrl;
          foundImage.src = lastCropDataUrl;
          foundPlate.textContent = formatVrm(vrm);
          stopAutoScan();
          showScreen("found");
          setStatus("Plate found.");
        } catch (error) {
          if (mode === "auto") {
            setStatus(`Auto-scan failed: ${error.message}`);
          } else {
            stopCamera();
            setError(error.message);
          }
        } finally {
          busy = false;
          captureBtn.disabled = false;
        }
      }

      function formatVrm(vrm) {
        const clean = String(vrm || "").replace(/\s+/g, "").toUpperCase();
        if (clean.length > 4) return `${clean.slice(0, 4)} ${clean.slice(4)}`;
        return clean;
      }

      async function getValuation() {
        if (!confirmedVrm) return;
        valuationBtn.disabled = true;
        valuatingPlate.textContent = formatVrm(confirmedVrm);
        showScreen("valuating");

        const prompt = `UK motor trade valuation for VRM '${confirmedVrm}'. Return ONLY JSON, no markdown. Include exactly these keys: {"make":null,"model":null,"variant":null,"year":null,"colour":null,"engineSize":null,"fuelType":null,"transmission":null,"mileageEstimate":null,"motExpiry":null,"taxStatus":null,"tradeValue":null,"privateValue":null,"retailValue":null,"condition":null,"notes":null}`;

        try {
          const output = await callOpenAIForText([
            {
              role: "user",
              content: [{ type: "input_text", text: prompt }]
            }
          ]);
          const valuation = parseJsonText(output);
          renderResult(valuation);
          showScreen("result");
        } catch (error) {
          setError(error.message);
        } finally {
          valuationBtn.disabled = false;
        }
      }

      function renderResult(data) {
        resultPlate.textContent = formatVrm(confirmedVrm);
        tradeValue.textContent = valueOrDash(data.tradeValue);
        privateValue.textContent = valueOrDash(data.privateValue);
        retailValue.textContent = valueOrDash(data.retailValue);

        const fields = [
          ["Make", data.make],
          ["Model", data.model],
          ["Variant", data.variant],
          ["Year", data.year],
          ["Colour", data.colour],
          ["Engine", data.engineSize],
          ["Fuel", data.fuelType],
          ["Transmission", data.transmission],
          ["Mileage", data.mileageEstimate],
          ["MOT Expiry", data.motExpiry],
          ["Tax Status", data.taxStatus],
          ["Condition", data.condition]
        ];

        detailsGrid.innerHTML = fields.map(([label, value]) => (
          `<div class="detail"><span>${escapeHtml(label)}</span><strong>${escapeHtml(valueOrDash(value))}</strong></div>`
        )).join("");
        notes.textContent = valueOrDash(data.notes);
      }

      function valueOrDash(value) {
        if (value === null || value === undefined || value === "") return "-";
        return String(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function resetToIdle() {
        stopCamera();
        confirmedVrm = "";
        lastCropDataUrl = "";
        foundImage.removeAttribute("src");
        showScreen("idle");
      }

      function resumeScanning() {
        confirmedVrm = "";
        lastCropDataUrl = "";
        foundImage.removeAttribute("src");
        showScreen("camera");
        setStatus("Camera active. Align plate inside box.");
        startAutoScan();
      }

      document.getElementById("startBtn").addEventListener("click", startCamera);
      document.getElementById("cancelBtn").addEventListener("click", resetToIdle);
      captureBtn.addEventListener("click", () => scanPlate("manual"));
      valuationBtn.addEventListener("click", getValuation);
      document.getElementById("scanAgainBtn").addEventListener("click", resumeScanning);
      document.getElementById("scanAnotherBtn").addEventListener("click", resetToIdle);
      document.getElementById("retryBtn").addEventListener("click", () => {
        if (stream) {
          showScreen("camera");
        } else {
          showScreen("idle");
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) stopAutoScan();
        if (!document.hidden && screens.camera.classList.contains("active") && stream) startAutoScan();
      });
    })();
  </script>
</body>
</html>
